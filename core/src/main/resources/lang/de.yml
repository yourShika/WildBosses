  "AXE STORM!": "AXTSTURM!"
  "BLOOD MOON!": "BLUTMOND!"
  "Behold true beauty.": "Erblicke wahre Schönheit."
  "Blink. I dare you.": "Blinzle. Trau dich."
  "Bow to the Goldtusk King!": "Verneige dich vor dem Goldzahnkönig!"
  "Breathe deep, it's already in you.": "Atme tief ein, es ist schon in dir."
  "Breathe it in.": "Atme es ein."
  "Bzzz... you smell like a thief.": "Bzzz... du riechst wie ein Dieb."
  "Chop, chop, chop!": "Hack, hack, hack!"
  "Colour is a weapon, darling.": "Farbe ist eine Waffe, Liebes."
  "Come closer, little star.": "Komm näher, kleiner Stern."
  "Do not struggle. It is quicker.": "Wehr dich nicht. Es geht schneller."
  "Down... come down with me.": "Hinab... komm mit mir hinab."
  "Feel the pressure?": "Spürst du den Druck?"
  "Gold... and your bones... are MINE!": "Gold... und deine Knochen... gehören MIR!"
  "Hold still, this won't hurt... me.": "Halt still, das tut nicht weh... mir."
  "I am everywhere and nowhere.": "Ich bin überall und nirgends."
  "I can smell your fear.": "Ich rieche deine Angst."
  "IF I FALL... YOU FALL WITH ME!": "WENN ICH FALLE... FÄLLST DU MIT MIR!"
  "Join the Legion... you have no choice.": "Tritt der Legion bei... du hast keine Wahl."
  "Ka... BOOM!": "Ka... BUMM!"
  "Kneel before the King.": "Knie nieder vor dem König."
  "Let me show you true darkness.": "Lass mich dir wahre Finsternis zeigen."
  "Let's make a big bang.": "Machen wir einen großen Knall."
  "Look at me. I insist.": "Sieh mich an. Ich bestehe darauf."
  "Look up.": "Sieh nach oben."
  "Look up. Your soul is due.": "Sieh nach oben. Deine Seele ist fällig."
  "Magic older than your gods.": "Magie älter als deine Götter."
  "Mind the eggs.": "Pass auf die Eier auf."
  "More! I need MORE!": "Mehr! Ich brauche MEHR!"
  "My aim never wavers.": "Mein Ziel wankt nie."
  "My children are always hungry.": "Meine Kinder sind immer hungrig."
  "Now you die.": "Jetzt stirbst du."
  "Nowhere to hide.": "Kein Entkommen."
  "Rain of bone!": "Regen aus Knochen!"
  "Rise, my children... feast!": "Erhebt euch, meine Kinder... schlemmt!"
  "Rot from within.": "Verfaule von innen."
  "Rot spreads... you cannot stop it.": "Die Fäulnis breitet sich aus... du kannst sie nicht aufhalten."
  "Run. It's more fun when you run.": "Lauf. Es macht mehr Spaß, wenn du läufst."
  "Shinies! Give me your shinies!": "Glitzerkram! Gib mir deinen Glitzerkram!"
  "Sssssay goodbye.": "Sssag Lebewohl."
  "Sssurprise underfoot.": "Überrasssschung unter deinen Füßen."
  "The King has arrived, worms!": "Der König ist da, ihr Würmer!"
  "The deep claims all.": "Die Tiefe holt sich alles."
  "The grave has no king but me.": "Das Grab hat keinen König außer mir."
  "The harvest is always plentiful.": "Die Ernte ist immer reich."
  "The pack is always hungry.": "Das Rudel ist immer hungrig."
  "The rot is a gift.": "Die Fäulnis ist ein Geschenk."
  "The sky itself is my quiver.": "Der Himmel selbst ist mein Köcher."
  "The sky reaps you.": "Der Himmel erntet dich."
  "The tide always wins.": "Die Flut gewinnt immer."
  "The void hungers.": "Die Leere hungert."
  "There is no escape from the dark.": "Es gibt kein Entkommen aus der Dunkelheit."
  "Tick... tick... tick...": "Tick... tick... tick..."
  "Which of us is real?": "Wer von uns ist echt?"
  "You are so very small.": "Du bist so winzig klein."
  "You beat my warband? Now beat ME!": "Du hast meine Bande besiegt? Jetzt besiege MICH!"
  "You cannot outrun a rainbow.": "Vor einem Regenbogen kannst du nicht davonlaufen."
  "You dare enter my realm?": "Du wagst es, mein Reich zu betreten?"
  "You disturbed the hive.": "Du hast den Bienenstock gestört."
  "You should not have come here.": "Du hättest nicht herkommen sollen."
  "You will be a pincushion.": "Du wirst ein Nadelkissen."
  "You'd make a lovely statue.": "Du gäbst eine hübsche Statue ab."
  "Your flesh will join my court.": "Dein Fleisch wird meinem Hofstaat beitreten."
  "Your soul makes fine reagent.": "Deine Seele gibt eine gute Zutat ab."
  "Your time is spent.": "Deine Zeit ist abgelaufen."
  "Warthoglin roars - the tusk-king's fury builds!": "<#ff8c00>Warthoglin brüllt - die Wut des Hauerkönigs wächst!"
  "The water churns - Abyssos, the Leviathan, surfaces!": "<aqua>Das Wasser brodelt - Abyssos, der Leviathan, taucht auf!"
  "Abyssos drags the deep up with it!": "<blue>Abyssos reißt die Tiefe mit sich hoch!"
  "Abyssos unleashes the maelstrom!": "<blue>Abyssos entfesselt den Mahlstrom!"
  "Mortarion drinks deep of the fallen!": "<dark_gray>Mortarion labt sich tief an den Gefallenen!"
  "Mortarion swings his soul-scythe in a wide arc!": "<dark_gray>Mortarion schwingt seine Seelensense in weitem Bogen!"
  "Grizznak flies into a plundering rage!": "<dark_green>Grizznak verfällt in plündernde Raserei!"
  "Kaboomicus begins to overcharge!": "<dark_green>Kaboomicus lädt sich über!"
  "Medusa's serpents hiss as one!": "<dark_green>Medusas Schlangen zischen wie eine!"
  "Mortis bellows and the horde swells!": "<dark_green>Mortis brüllt und die Horde schwillt an!"
  "Mortis pounds the ground in fury!": "<dark_green>Mortis hämmert wütend auf den Boden!"
  "Pestis exhales a cloud of contagion!": "<dark_green>Pestis stößt eine Wolke der Ansteckung aus!"
  "Pestis rots into a plague-storm!": "<dark_green>Pestis verfault zu einem Seuchensturm!"
  "Nyxara flickers between spaces!": "<dark_purple>Nyxara flackert zwischen den Räumen!"
  "Nyxara tears reality asunder!": "<dark_purple>Nyxara zerreißt die Wirklichkeit!"
  "Oberhexe Walak descends in a swirl of shadow!": "<dark_purple>Oberhexe Walak steigt in einem Wirbel aus Schatten herab!"
  "Walak channels the black storm!": "<dark_purple>Walak beschwört den schwarzen Sturm!"
  "Walak weaves a darker spell!": "<dark_purple>Walak webt einen dunkleren Zauber!"
  "Fenrar's eyes blaze - the blood moon rises!": "<dark_red>Fenrars Augen lodern - der Blutmond steigt auf!"
  "Vespula summons the swarm!": "<gold>Vespula ruft den Schwarm!"
  "Warthoglin, the Goldtusk King, charges onto the field!": "<gold>Warthoglin, der Goldzahnkönig, stürmt auf das Feld!"
  "Aurelith, the Prism Mare, shimmers into the world!": "<gradient:#f9a8d4:#93c5fd>Aurelith, die Prismastute, schimmert in die Welt!</gradient>"
  "Ossaria calls down a storm of arrows!": "<gray>Ossaria ruft einen Pfeilsturm herab!"
  "Ossaria raises a shield of bone!": "<gray>Ossaria hebt einen Schild aus Knochen!"
  "The air turns cold... Mortarion, the Harvester, has come to reap.": "<gray>Die Luft wird kalt... Mortarion, der Schnitter, ist gekommen, um zu ernten."
  "Grizznak the Goblin King enters the fray!": "<green>Grizznak, der Goblinkönig, betritt das Schlachtfeld!"
  "Kaboomicus fizzes ominously into view...": "<green>Kaboomicus zischt bedrohlich ins Bild..."
  "Medusa of Bikini Bottom surfaces - don't look into her eyes!": "<green>Medusa von Bikini Bottom taucht auf - sieh ihr nicht in die Augen!"
  "Medusa's spines bristle with venom!": "<green>Medusas Stacheln triefen vor Gift!"
  "Mortis, the Zombie King, rises from the earth!": "<green>Mortis, der Zombiekönig, erhebt sich aus der Erde!"
  "Pestis splits open - the pestilence spreads!": "<green>Pestis platzt auf - die Pest breitet sich aus!"
  "Pestis, the Plaguebearer, festers into being!": "<green>Pestis, der Seuchenbringer, eitert ins Dasein!"
  "Aurelith ascends in a storm of colour!": "<light_purple>Aurelith steigt in einem Sturm aus Farben auf!"
  "Aurelith's mane blazes with prism-light!": "<light_purple>Aureliths Mähne lodert in Prismenlicht!"
  "Nyxara, Queen of the Void, materialises!": "<light_purple>Nyxara, Königin der Leere, materialisiert sich!"
  "A howl splits the night - Fenrar, the Bloodmoon, hunts!": "<red>Ein Heulen zerreißt die Nacht - Fenrar, der Blutmond, jagt!"
