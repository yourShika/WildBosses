# WildBosses Sprachdatei (Deutsch). Fehlende Schluessel fallen auf Englisch zurueck.

no-permission: "<red>Dazu hast du keine Berechtigung."
player-only: "<red>Das kann nur ein Spieler im Spiel benutzen."
reloaded: "<green>Konfiguration und Bosse neu geladen (<yellow><count></yellow> Bosse)."
reload-failed: "<red>Neuladen fehlgeschlagen: <yellow><error></yellow>. Siehe Konsole."
unknown-boss: "<red>Unbekannte Boss-ID: <yellow><id></yellow>."
spawned: "<green>Boss <boss> <green>bei <yellow><x>, <y>, <z></yellow> in <yellow><world></yellow> gespawnt."
spawn-failed: "<red>Konnte <yellow><id></yellow> nicht spawnen: <gray><reason></gray>."
army-started: "<green>Die <boss> <green>-Armee wurde in <yellow><world></yellow> gestartet."
killed-all: "<green><yellow><count></yellow> aktive(n) Boss(e)/Encounter entfernt."
no-active: "<gray>Derzeit sind keine Bosse aktiv."
list-header: "<gradient:#f8b500:#fceabb><bold>WildBosses</bold></gradient> <gray>- registrierte Bosse (<yellow><count></yellow>):"
active-header: "<gray>Aktive Encounter (<yellow><count></yellow>):"
word-someone: "Jemand"
broadcast-boss-spawn: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <white>Ein wilder <boss> <difficulty> <white>ist in <yellow><world></yellow> bei <yellow><x>, <z></yellow> erschienen!"
broadcast-army-spawn: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <white>Die <boss> <difficulty> <white>überfällt <yellow><world></yellow> bei <yellow><x>, <z></yellow>!"
broadcast-boss-death: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <white>Der <boss> <white>wurde von <yellow><slayers></yellow> besiegt!"
broadcast-boss-fled: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <gray>Der <boss> <gray>wurde des Wartens müde und floh in die Wildnis..."
broadcast-boss-drop: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <yellow><player></yellow> <white>erbeutete <item> <white>vom <boss><white>!"
discord-boss-spawn: ":crossed_swords: **%boss%** [%difficulty%] ist in %world% bei %x%, %z% erschienen"
discord-army-spawn: ":skull: **%boss%** [%difficulty%] überfällt %world% bei %x%, %z%"
discord-boss-death: ":trophy: **%boss%** wurde von %slayers% besiegt!"

help:
  - "<gradient:#f8b500:#fceabb><bold>WildBosses</bold></gradient> <gray>Befehle:"
  - "<yellow>/wb spawn <id|random> [here|player] <gray>- einen Boss spawnen"
  - "<yellow>/wb army <id|random> <gray>- eine Armee starten"
  - "<yellow>/wb list <gray>- das Bestiarium öffnen (Bosse + Drops)"
  - "<yellow>/wb active <gray>- aktive Encounter anzeigen"
  - "<yellow>/wb info <id> <gray>- Details zu einem Boss"
  - "<yellow>/wb gui <gray>- das Admin-GUI öffnen"
  - "<yellow>/wb killall <gray>- alle aktiven Bosse entfernen"
  - "<yellow>/wb reload <gray>- Config und Bosse neu laden"
  - "<yellow>/wb restore default <gray>- Boss-Dateien zurücksetzen"
  - "<yellow>/wb update <gray>- neueste Version von GitHub laden"

