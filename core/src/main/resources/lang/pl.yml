  "AXE STORM!": "BURZA TOPORÓW!"
  "BLOOD MOON!": "KRWAWY KSIĘŻYC!"
  "Behold true beauty.": "Oto prawdziwe piękno."
  "Blink. I dare you.": "Mrugnij. No śmiało."
  "Bow to the Goldtusk King!": "Pokłoń się Królowi Złotego Kła!"
  "Breathe deep, it's already in you.": "Oddychaj głęboko, już jest w tobie."
  "Breathe it in.": "Wciągnij to."
  "Bzzz... you smell like a thief.": "Bzzz... pachniesz jak złodziej."
  "Chop, chop, chop!": "Rąb, rąb, rąb!"
  "Colour is a weapon, darling.": "Kolor to broń, kochanie."
  "Come closer, little star.": "Podejdź bliżej, gwiazdeczko."
  "Do not struggle. It is quicker.": "Nie szarp się. Będzie szybciej."
  "Down... come down with me.": "W dół... zejdź ze mną w głębinę."
  "Feel the pressure?": "Czujesz to ciśnienie?"
  "Gold... and your bones... are MINE!": "Złoto... i twoje kości... są MOJE!"
  "Hold still, this won't hurt... me.": "Nie ruszaj się, to nie zaboli... mnie."
  "I am everywhere and nowhere.": "Jestem wszędzie i nigdzie."
  "I can smell your fear.": "Czuję twój strach."
  "IF I FALL... YOU FALL WITH ME!": "JEŚLI PADNĘ... PADNIESZ ZE MNĄ!"
  "Join the Legion... you have no choice.": "Dołącz do Legionu... nie masz wyboru."
  "Ka... BOOM!": "Ka... BUM!"
  "Kneel before the King.": "Klęknij przed Królem."
  "Let me show you true darkness.": "Pozwól, że pokażę ci prawdziwą ciemność."
  "Let's make a big bang.": "Zróbmy wielki wybuch."
  "Look at me. I insist.": "Spójrz na mnie. Nalegam."
  "Look up.": "Spójrz w górę."
  "Look up. Your soul is due.": "Spójrz w górę. Twoja dusza czeka."
  "Magic older than your gods.": "Magia starsza niż twoi bogowie."
  "Mind the eggs.": "Uważaj na jaja."
  "More! I need MORE!": "Więcej! Potrzebuję WIĘCEJ!"
  "My aim never wavers.": "Moja celność nigdy nie zawodzi."
  "My children are always hungry.": "Moje dzieci zawsze są głodne."
  "Now you die.": "Teraz zginiesz."
  "Nowhere to hide.": "Nie ma gdzie się schować."
  "Rain of bone!": "Deszcz kości!"
  "Rise, my children... feast!": "Powstańcie, moje dzieci... ucztujcie!"
  "Rot from within.": "Gnij od środka."
  "Rot spreads... you cannot stop it.": "Zgnilizna się rozprzestrzenia... nie powstrzymasz jej."
  "Run. It's more fun when you run.": "Uciekaj. Jest fajniej, gdy uciekasz."
  "Shinies! Give me your shinies!": "Błyskotki! Dawaj swoje błyskotki!"
  "Sssssay goodbye.": "Pożżżegnaj się."
  "Sssurprise underfoot.": "Niesssspodzianka pod nogami."
  "The King has arrived, worms!": "Król przybył, robaki!"
  "The deep claims all.": "Głębia zabiera wszystko."
  "The grave has no king but me.": "Grób nie ma innego króla niż ja."
  "The harvest is always plentiful.": "Żniwa zawsze są obfite."
  "The pack is always hungry.": "Wataha zawsze jest głodna."
  "The rot is a gift.": "Zgnilizna to dar."
  "The sky itself is my quiver.": "Samo niebo jest moim kołczanem."
  "The sky reaps you.": "Niebo zbiera twoje żniwo."
  "The tide always wins.": "Przypływ zawsze wygrywa."
  "The void hungers.": "Pustka łaknie."
  "There is no escape from the dark.": "Nie ma ucieczki przed ciemnością."
  "Tick... tick... tick...": "Tik... tik... tik..."
  "Which of us is real?": "Które z nas jest prawdziwe?"
  "You are so very small.": "Jesteś taki maleńki."
  "You beat my warband? Now beat ME!": "Pokonałeś moją bandę? Teraz pokonaj MNIE!"
  "You cannot outrun a rainbow.": "Nie uciekniesz przed tęczą."
  "You dare enter my realm?": "Śmiesz wkraczać do mojego królestwa?"
  "You disturbed the hive.": "Zakłóciłeś spokój ula."
  "You should not have come here.": "Nie powinieneś był tu przychodzić."
  "You will be a pincushion.": "Będziesz poduszeczką na igły."
  "You'd make a lovely statue.": "Byłbyś uroczym posągiem."
  "Your flesh will join my court.": "Twoje ciało dołączy do mego dworu."
  "Your soul makes fine reagent.": "Twoja dusza to świetny składnik."
  "Your time is spent.": "Twój czas dobiegł końca."
  "Warthoglin roars - the tusk-king's fury builds!": "<#ff8c00>Warthoglin ryczy - gniew króla kłów narasta!"
  "The water churns - Abyssos, the Leviathan, surfaces!": "<aqua>Woda się burzy - Abyssos, Lewiatan, wynurza się!"
  "Abyssos drags the deep up with it!": "<blue>Abyssos wyciąga za sobą głębiny!"
  "Abyssos unleashes the maelstrom!": "<blue>Abyssos uwalnia wir!"
  "Mortarion drinks deep of the fallen!": "<dark_gray>Mortarion pije głęboko z poległych!"
  "Mortarion swings his soul-scythe in a wide arc!": "<dark_gray>Mortarion zatacza szeroki łuk kosą dusz!"
  "Grizznak flies into a plundering rage!": "<dark_green>Grizznak wpada w grabieżczy szał!"
  "Kaboomicus begins to overcharge!": "<dark_green>Kaboomicus zaczyna się przeładowywać!"
  "Medusa's serpents hiss as one!": "<dark_green>Węże Meduzy syczą jak jeden!"
  "Mortis bellows and the horde swells!": "<dark_green>Mortis ryczy, a horda rośnie w siłę!"
  "Mortis pounds the ground in fury!": "<dark_green>Mortis wściekle wali w ziemię!"
  "Pestis exhales a cloud of contagion!": "<dark_green>Pestis wydycha chmurę zarazy!"
  "Pestis rots into a plague-storm!": "<dark_green>Pestis gnije w burzę zarazy!"
  "Nyxara flickers between spaces!": "<dark_purple>Nyxara miga między przestrzeniami!"
  "Nyxara tears reality asunder!": "<dark_purple>Nyxara rozdziera rzeczywistość!"
  "Oberhexe Walak descends in a swirl of shadow!": "<dark_purple>Arcywiedźma Walak zstępuje w wirze cienia!"
  "Walak channels the black storm!": "<dark_purple>Walak przywołuje czarną burzę!"
