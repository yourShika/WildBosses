# Plik jezykowy WildBosses (Polski). Brakujace klucze wracaja do angielskiego.

no-permission: "<red>Nie masz do tego uprawnień."
player-only: "<red>To może zrobić tylko gracz w grze."
reloaded: "<green>Przeładowano konfigurację i bossów (<yellow><count></yellow> bossów)."
reload-failed: "<red>Przeładowanie nie powiodło się: <yellow><error></yellow>. Sprawdź konsolę."
unknown-boss: "<red>Nieznane id bossa: <yellow><id></yellow>."
spawned: "<green>Zrodzono <boss> <green>w <yellow><x>, <y>, <z></yellow> na <yellow><world></yellow>."
spawn-failed: "<red>Nie udało się zrodzić <yellow><id></yellow>: <gray><reason></gray>."
army-started: "<green>Rozpoczęto starcie z armią <boss> <green>na <yellow><world></yellow>."
killed-all: "<green>Usunięto <yellow><count></yellow> aktywnych bossów/starć."
no-active: "<gray>Obecnie nie ma aktywnych bossów."
list-header: "<gradient:#f8b500:#fceabb><bold>WildBosses</bold></gradient> <gray>- zarejestrowani bossowie (<yellow><count></yellow>):"
active-header: "<gray>Aktywne starcia (<yellow><count></yellow>):"
word-someone: "Ktoś"
broadcast-boss-spawn: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <white>Dziki <boss> <difficulty> <white>pojawił się na <yellow><world></yellow> w pobliżu <yellow><x>, <z></yellow>!"
broadcast-army-spawn: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <white><boss> <difficulty> <white>najeżdża <yellow><world></yellow> w pobliżu <yellow><x>, <z></yellow>!"
broadcast-boss-death: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <white><boss> <white>został pokonany przez <yellow><slayers></yellow>!"
broadcast-boss-fled: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <gray><boss> <gray>zmęczył się czekaniem i uciekł w dzicz..."
broadcast-boss-drop: "<gradient:#f8b500:#fceabb><bold>[WildBosses]</bold></gradient> <yellow><player></yellow> <white>zdobył <item> <white>od <boss><white>!"
discord-boss-spawn: ":crossed_swords: **%boss%** [%difficulty%] pojawił się na %world% w pobliżu %x%, %z%"
discord-army-spawn: ":skull: **%boss%** [%difficulty%] najeżdża %world% w pobliżu %x%, %z%"
discord-boss-death: ":trophy: **%boss%** został pokonany przez %slayers%!"

help:
  - "<gradient:#f8b500:#fceabb><bold>WildBosses</bold></gradient> <gray>komendy:"
  - "<yellow>/wb spawn <id|random> [here|player] <gray>- zrodź bossa"
  - "<yellow>/wb army <id|random> <gray>- rozpocznij starcie z armią"
  - "<yellow>/wb lunar <bloodmoon|crystalmoon|stop> [świat] <gray>- uruchom/zatrzymaj wydarzenie księżycowe"
  - "<yellow>/wb list <gray>- otwórz bestiariusz (bossowie + łupy)"
  - "<yellow>/wb active <gray>- pokaż aktywne starcia"
  - "<yellow>/wb info <id> <gray>- szczegóły bossa"
  - "<yellow>/wb gui <gray>- otwórz panel administratora"
  - "<yellow>/wb killall <gray>- usuń wszystkich aktywnych bossów"
  - "<yellow>/wb reload <gray>- przeładuj konfigurację i bossów"
  - "<yellow>/wb restore default <gray>- przywróć domyślne pliki bossów"
  - "<yellow>/wb update <gray>- pobierz najnowszą wersję z GitHub"

