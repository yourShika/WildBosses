# Fenrar, the Bloodmoon - HARD overworld beast. A huge, aggressive dire wolf that hunts at night.
id: werewolf
name: "<gradient:#9ca3af:#450a0a>Fenrar, the Bloodmoon</gradient>"
title: "<gray>the Werewolf"
difficulty: HARD
base-entity: WOLF
stats: { health: 580, armor: 8, knockback-resistance: 0.5, damage: 15, speed: 0.42, follow-range: 55, scale: 1.8 }
bossbar: { color: RED, style: NOTCHED_10 }
spawn:
  worlds: [OVERWORLD]
  weight: 16
  min-players-distance: 40
  y: { min: 45, max: 120 }
  cooldown-seconds: 2400
  max-concurrent: 1
  time: NIGHT                # the werewolf only hunts at night
phases:
  - { at-health-percent: 100, message: "<red>A howl splits the night - Fenrar, the Bloodmoon, hunts!" }
  - { at-health-percent: 50, enrage: true, message: "<dark_red>Fenrar's eyes blaze - the blood moon rises!" }
skills:
  - { trigger: onSpawn, mechanic: sound, targeter: self_location, params: { sound: "entity.wolf.growl", volume: 1.8, pitch: 0.5 } }
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 45, lines: ["I can smell your fear.", "Run. It's more fun when you run.", "The pack is always hungry."] } }
  - { trigger: onTimer, interval: 16, mechanic: particle, targeter: self_location, params: { particle: DUST, count: 4, spread: 0.5, offset-y: 1.0 } }
  # Signature: a savage pounce that lunges onto the target, then rakes everyone nearby.
  - { trigger: onTimer, interval: 70, interval-max: 120, mechanic: sound, targeter: self_location, params: { sound: "entity.wolf.howl", volume: 1.4, pitch: 0.8 } }
  - { trigger: onTimer, interval: 70, interval-max: 120, mechanic: leap, targeter: nearest_player, params: { power: 1.8, vertical: 0.55 } }
  - { trigger: onTimer, interval: 74, interval-max: 124, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 4, damage: 9, knockback: 0.8, particle: CRIT } }
  # Frenzied bite drains life; grows stronger when enraged.
  - { trigger: onTimer, interval: 90, interval-max: 150, mechanic: lifesteal, targeter: players_in_radius, params: { radius: 3, amount: 9, heal-ratio: 0.6 } }
  # Bloodmoon Howl: rare, weakens the pack's prey and calls two wolves.
  - { trigger: onTimer, interval: 320, interval-max: 520, mechanic: potion, targeter: players_in_radius, params: { radius: 8, type: WEAKNESS, duration: 160, amplifier: 0 } }
  - { trigger: onTimer, interval: 320, interval-max: 520, mechanic: summon, targeter: self_location, params: { type: WOLF, amount: 2, radius: 5, health: 30 } }
  - { trigger: onHealthBelow, value: 50, mechanic: buff, targeter: self, params: { type: SPEED, duration: 300, amplifier: 2 } }
  - { trigger: onHealthBelow, value: 50, mechanic: say, targeter: nearest_player, params: { radius: 45, lines: ["BLOOD MOON!", "Now you die."] } }
drops:
  items:
    # Common
    - { item: LEATHER, amount: "6-12", chance: 1.0, rarity: COMMON }
    - { item: DIAMOND, amount: "3-6", chance: 1.0, rarity: COMMON }
    # Uncommon
    - { item: GOLDEN_APPLE, amount: "1-3", chance: 0.65, rarity: UNCOMMON, name: "<gradient:#9ca3af:#450a0a>Bloodmoon Heart</gradient>" }
    # Rare
    - { item: DIAMOND_CHESTPLATE, amount: 1, chance: 0.35, rarity: RARE,
        name: "<gradient:#9ca3af:#450a0a>Pelt of Fenrar</gradient>",
        lore: ["<dark_gray>Still warm."], enchants: ["PROTECTION:4", "THORNS:3"] }
    # Legendary
    - { item: NETHERITE_SWORD, amount: 1, chance: 0.18, rarity: LEGENDARY,
        name: "<gradient:#9ca3af:#450a0a>Bloodfang</gradient>",
        lore: ["<dark_gray>Torn from the Bloodmoon itself.", "<red>Thirsts for the hunt."],
        enchants: ["SHARPNESS:6", "SWEEPING_EDGE:3", "FIRE_ASPECT:2"] }
  xp: 700
