# Oberhexe Walak - ULTRA_HARD overworld dark-magic boss. A true witch: creeping ground-poison and
# black-magic spells. (No more Vex swarm - she is a WITCH, not an evoker.)
id: walak
name: "<gradient:#7c3aed:#2e1065>Oberhexe Walak</gradient>"
title: "<gray>the Blackmage"
difficulty: ULTRA_HARD
base-entity: WITCH
stats: { health: 620, armor: 8, knockback-resistance: 0.6, damage: 9, speed: 0.3, follow-range: 48, scale: 1.4 }
bossbar: { color: PURPLE, style: NOTCHED_10 }
immunities: [MAGIC]
enrage-timer: { enabled: true, after-seconds: 300, interval-seconds: 45, damage-mult: 1.12, speed-mult: 1.05 }
spawn:
  worlds: [OVERWORLD]
  weight: 12
  min-players-distance: 44
  y: { min: 45, max: 120 }
  cooldown-seconds: 3000
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<dark_purple>Oberhexe Walak descends in a swirl of shadow!" }
  - { at-health-percent: 60, message: "<dark_purple>Walak weaves a darker spell!" }
  - { at-health-percent: 30, enrage: true, message: "<dark_purple>Walak channels the black storm!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 45, lines: ["Your soul makes fine reagent.", "Magic older than your gods.", "Let me show you true darkness."] } }
  - { trigger: onTimer, interval: 10, mechanic: particle, targeter: self_location, params: { particle: WITCH, count: 10, spread: 0.9, offset-y: 1.3 } }
  # Creeping venom: pools of lingering poison bloom under the players' feet.
  - { trigger: onTimer, interval: 90, interval-max: 150, mechanic: say, targeter: players_in_radius, params: { radius: 30, lines: ["Rot from within.", "Breathe it in."] } }
  - { trigger: onTimer, interval: 90, interval-max: 150, mechanic: potion_cloud, targeter: players_in_radius, params: { type: POISON, duration: 120, amplifier: 1, radius: 3, cloud-duration: 160 } }
  - { trigger: onTimer, interval: 110, interval-max: 170, mechanic: danger_zone, targeter: players_in_radius, params: { radius: 4, damage: 8, delay: 30, warn-particle: WITCH, particle: SNEEZE } }
  # Black magic: a bolt of harming, a dark hex, and a blink.
  - { trigger: onTimer, interval: 100, interval-max: 150, mechanic: throw_potion, targeter: nearest_player, params: { type: INSTANT_DAMAGE, amplifier: 1, velocity: 1.0 } }
  - { trigger: onTimer, interval: 140, interval-max: 210, mechanic: potion, targeter: players_in_radius, params: { radius: 8, type: WITHER, duration: 120, amplifier: 1 } }
  - { trigger: onTimer, interval: 80, interval-max: 140, mechanic: teleport, targeter: nearest_player, params: { radius: 4 } }
  - { trigger: onTimer, interval: 160, interval-max: 240, mechanic: meteor, targeter: players_in_radius, params: { count: 4, radius: 7, height: 22, damage: 10, delay: 28 } }
  - { trigger: onHealthBelow, value: 60, mechanic: lightning, targeter: players_in_radius, params: { damage: true } }
  - { trigger: onHealthBelow, value: 30, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 8, damage: 12, knockback: 1.2, particle: SOUL_FIRE_FLAME } }
  - { trigger: onHealthBelow, value: 30, mechanic: buff, targeter: self, params: { type: RESISTANCE, duration: 200, amplifier: 1 } }
drops:
  items:
    # Common
    - { item: DIAMOND, amount: "5-9", chance: 1.0, rarity: COMMON }
    - { item: SPIDER_EYE, amount: "3-7", chance: 0.85, rarity: COMMON }
    - { item: REDSTONE, amount: "4-10", chance: 0.8, rarity: COMMON }
    - { item: GLOWSTONE_DUST, amount: "3-7", chance: 0.8, rarity: COMMON }
    - { item: SUGAR, amount: "3-7", chance: 0.7, rarity: COMMON }
    - { item: GLASS_BOTTLE, amount: "2-4", chance: 0.7, rarity: COMMON, name: "<gradient:#7c3aed:#2e1065>Vial of Nightshade</gradient>" }
    # Uncommon
    - { item: FERMENTED_SPIDER_EYE, amount: "1-3", chance: 0.5, rarity: UNCOMMON }
    - { item: ENCHANTED_BOOK, amount: 1, chance: 0.5, rarity: UNCOMMON, name: "<gradient:#7c3aed:#2e1065>Grimoire Page</gradient>",
        lore: ["<dark_gray>Forbidden knowledge, bound in skin."], enchants: ["SHARPNESS:6", "CURSE_OF_VANISHING:1"] }
    # Rare
    - { item: NETHERITE_HOE, amount: 1, chance: 0.3, rarity: RARE,
        name: "<gradient:#7c3aed:#2e1065>Hexstaff of the Blackmage</gradient>",
        lore: ["<dark_gray>Whispers of the coven cling to it.", "<dark_purple>Bane of the living."],
        enchants: ["SHARPNESS:6", "FIRE_ASPECT:3", "UNBREAKING:5", "MENDING:1"] }
    # Legendary
    - { item: TOTEM_OF_UNDYING, amount: 1, chance: 0.22, rarity: LEGENDARY, name: "<gradient:#7c3aed:#2e1065>Walak's Phylactery</gradient>" }
    # Mythical
    - { item: ENCHANTED_GOLDEN_APPLE, amount: 1, chance: 0.05, rarity: MYTHICAL,
        name: "<gradient:#ff6bd6:#c86bff>Heart of the Coven</gradient>", lore: ["<dark_gray>Pulsing with stolen souls."] }
  xp: 1050
