# The Harvester - ULTRA_HARD reaper boss. Wears a glowing jack-o'-lantern and reaps souls. Its
# soul-storm AoE now forms in the AIR above its victims rather than on the ground.
id: harvester
name: "<gradient:#a3a3a3:#111827>Mortarion, the Harvester</gradient>"
title: "<gray>Reaper of Souls"
difficulty: ULTRA_HARD
base-entity: WITHER_SKELETON
stats: { health: 720, armor: 14, armor-toughness: 6, knockback-resistance: 0.8, damage: 14, speed: 0.3, follow-range: 50, scale: 1.6 }
equipment: { hand: NETHERITE_HOE, head: JACK_O_LANTERN }
bossbar: { color: WHITE, style: NOTCHED_10 }
immunities: [WITHER, FALL]
enrage-timer: { enabled: true, after-seconds: 300, interval-seconds: 45, damage-mult: 1.12, speed-mult: 1.05 }
spawn:
  worlds: [OVERWORLD, NETHER]
  weight: 12
  min-players-distance: 44
  y: { min: 30, max: 110 }
  cooldown-seconds: 3000
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<gray>The air turns cold... Mortarion, the Harvester, has come to reap." }
  - { at-health-percent: 60, message: "<dark_gray>Mortarion swings his soul-scythe in a wide arc!" }
  - { at-health-percent: 30, enrage: true, message: "<dark_gray>Mortarion drinks deep of the fallen!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 45, lines: ["Your time is spent.", "The harvest is always plentiful.", "Do not struggle. It is quicker."] } }
  - { trigger: onTimer, interval: 14, mechanic: particle, targeter: self_location, params: { particle: SOUL, count: 6, spread: 0.7, offset-y: 1.4 } }
  - { trigger: onTimer, interval: 60, interval-max: 100, mechanic: lifesteal, targeter: players_in_radius, params: { radius: 4, amount: 9, heal-ratio: 0.75 } }
  # Scythe sweep: a wide arc that hits everyone around him.
  - { trigger: onTimer, interval: 100, interval-max: 150, mechanic: sound, targeter: self_location, params: { sound: "entity.player.attack.sweep", volume: 1.6, pitch: 0.6 } }
  - { trigger: onTimer, interval: 100, interval-max: 150, mechanic: axe_throw, targeter: self, params: { count: 12, velocity: 1.2, type: ARROW, particle: SOUL_FIRE_FLAME } }
  # Soul-storm: an aerial vortex of souls that forms in the air above the target, then crashes down.
  - { trigger: onTimer, interval: 130, interval-max: 190, mechanic: say, targeter: players_in_radius, params: { radius: 30, lines: ["The sky reaps you.", "Look up. Your soul is due."] } }
  - { trigger: onTimer, interval: 130, interval-max: 190, mechanic: danger_zone, targeter: players_in_radius, params: { radius: 4, damage: 12, delay: 32, offset-y: 3.5, warn-particle: SOUL_FIRE_FLAME, particle: SCULK_SOUL } }
  - { trigger: onTimer, interval: 120, interval-max: 180, mechanic: throw_potion, targeter: nearest_player, params: { type: WITHER, duration: 120, amplifier: 1, velocity: 1.0 } }
  - { trigger: onTimer, interval: 150, interval-max: 230, mechanic: summon, targeter: self_location, params: { type: WITHER_SKELETON, amount: 3, radius: 5 } }
  - { trigger: onHealthBelow, value: 60, mechanic: healer_adds, targeter: self, params: { type: WITHER_SKELETON, amount: 2, radius: 4, heal-per-second: 12, name: "<gray>Soul Attendant" } }
  - { trigger: onHealthBelow, value: 30, mechanic: lifesteal, targeter: players_in_radius, params: { radius: 8, amount: 12, heal-ratio: 1.0 } }
  - { trigger: onHealthBelow, value: 30, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 8, damage: 13, knockback: 1.0, particle: SCULK_SOUL } }
# Withers the ground into dead soil and leaves a small, abandoned, overgrown pumpkin farm behind -
# it STAYS (restore-on-end: false). Player builds are never overwritten.
terrain:
  enabled: true
  radius: 9
  max-blocks: 3200
  restore-on-end: false
  only-ungenerated-chunks: false
  mappings:
    GRASS_BLOCK: COARSE_DIRT
    DIRT: COARSE_DIRT
    PODZOL: COARSE_DIRT
    ROOTED_DIRT: COARSE_DIRT
    MOSS_BLOCK: COARSE_DIRT
    MYCELIUM: COARSE_DIRT
  features:
    - { type: pumpkin_patch, count: 4 }
drops:
  items:
    # Common
    - { item: DIAMOND, amount: "5-9", chance: 1.0, rarity: COMMON }
    - { item: BONE, amount: "6-12", chance: 0.85, rarity: COMMON }
    - { item: COAL, amount: "6-12", chance: 0.8, rarity: COMMON }
    - { item: SOUL_SAND, amount: "4-9", chance: 0.7, rarity: COMMON }
    - { item: NETHERITE_SCRAP, amount: "2-3", chance: 0.6, rarity: COMMON }
    # Uncommon
    - { item: WITHER_ROSE, amount: "1-3", chance: 0.4, rarity: UNCOMMON }
    # Rare
    - { item: WITHER_SKELETON_SKULL, amount: "1-2", chance: 0.5, rarity: RARE, name: "<gradient:#a3a3a3:#111827>Harvested Skull</gradient>" }
    - { item: CARVED_PUMPKIN, amount: 1, chance: 0.35, rarity: RARE,
        name: "<gradient:#a3a3a3:#111827>Reaper's Lantern</gradient>", lore: ["<gray>Its light never dies."] }
    # Legendary
    - { item: NETHERITE_HOE, amount: 1, chance: 0.2, rarity: LEGENDARY,
        name: "<gradient:#a3a3a3:#111827>Soul-Scythe of Mortarion</gradient>",
        lore: ["<dark_gray>It has reaped a thousand souls.", "<gray>It hungers for more."],
        enchants: ["SHARPNESS:7", "SWEEPING_EDGE:4", "LOOTING:4", "UNBREAKING:5", "MENDING:1"] }
    # Mythical
    - { item: TOTEM_OF_UNDYING, amount: 1, chance: 0.04, rarity: MYTHICAL,
        name: "<gradient:#ff6bd6:#c86bff>Stolen Soul</gradient>", lore: ["<dark_gray>One life the Harvester failed to claim."] }
  xp: 1150
