# Abyssos, the Leviathan - ULTRA_HARD deep-sea terror. Its attacks are now loudly telegraphed with
# heavy, varied particles and distinct sounds. Best fought in/near water.
# Pet reward uses a BetterPets id - adjust "axolotl" to match your setup.
id: leviathan
name: "<gradient:#38bdf8:#0c4a6e>Abyssos, the Leviathan</gradient>"
title: "<gray>Terror of the Deep"
difficulty: ULTRA_HARD
base-entity: ELDER_GUARDIAN
stats: { health: 800, armor: 14, knockback-resistance: 0.9, damage: 14, speed: 0.28, follow-range: 60, scale: 1.2 }
bossbar: { color: BLUE, style: NOTCHED_10 }
immunities: [DROWNING, FIRE]
enrage-timer: { enabled: true, after-seconds: 360, interval-seconds: 45, damage-mult: 1.1, speed-mult: 1.04 }
spawn:
  worlds: [OVERWORLD]
  weight: 10
  min-players-distance: 48
  y: { min: 30, max: 70 }
  cooldown-seconds: 3000
  max-concurrent: 1
  near-water: true
  biomes: [OCEAN, RIVER, BEACH, SWAMP]
phases:
  - { at-health-percent: 100, message: "<aqua>The water churns - Abyssos, the Leviathan, surfaces!" }
  - { at-health-percent: 60, message: "<blue>Abyssos drags the deep up with it!" }
  - { at-health-percent: 30, enrage: true, message: "<blue>Abyssos unleashes the maelstrom!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 55, lines: ["The deep claims all.", "You are so very small.", "Down... come down with me."] } }
  - { trigger: onSpawn, mechanic: sound, targeter: self_location, params: { sound: "entity.elder_guardian.curse", volume: 2.0, pitch: 0.7 } }
  - { trigger: onTimer, interval: 10, mechanic: particle, targeter: self_location, params: { particle: BUBBLE_COLUMN_UP, count: 12, spread: 1.2, offset-y: 1.2 } }
  - { trigger: onTimer, interval: 22, mechanic: particle, targeter: self_location, params: { particle: DRIPPING_DRIPSTONE_WATER, count: 8, spread: 1.4, offset-y: 1.8 } }
  # Whirlpool: a loud, particle-heavy pull toward the beast.
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: sound, targeter: self_location, params: { sound: "item.bucket.empty", volume: 2.0, pitch: 0.6 } }
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: particle, targeter: self_location, params: { particle: SPLASH, count: 60, spread: 3.0, offset-y: 0.5 } }
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: pull, targeter: players_in_radius, params: { radius: 14, strength: 1.4 } }
  # Abyssal beam: bright, dense trail with its own sound.
  - { trigger: onTimer, interval: 90, interval-max: 130, mechanic: sound, targeter: self_location, params: { sound: "entity.elder_guardian.attack", volume: 1.8, pitch: 1.0 } }
  - { trigger: onTimer, interval: 90, interval-max: 130, mechanic: beam, targeter: nearest_player, params: { radius: 40, damage: 14, particle: SONIC_BOOM } }
  # Tidal crash: a telegraphed slam with a big splash and thunder.
  - { trigger: onTimer, interval: 140, interval-max: 200, mechanic: sound, targeter: players_in_radius, params: { sound: "entity.lightning_bolt.thunder", volume: 1.5, pitch: 1.3 } }
  - { trigger: onTimer, interval: 140, interval-max: 200, mechanic: danger_zone, targeter: players_in_radius, params: { radius: 5, damage: 14, knockback: 1.2, delay: 30, warn-particle: BUBBLE_POP, particle: SPLASH } }
  - { trigger: onTimer, interval: 150, interval-max: 230, mechanic: summon, targeter: self_location, params: { type: GUARDIAN, amount: 3, radius: 6 } }
  - { trigger: onTimer, interval: 100, interval-max: 150, mechanic: potion, targeter: players_in_radius, params: { radius: 8, type: MINING_FATIGUE, duration: 200, amplifier: 2 } }
  - { trigger: onHealthBelow, value: 30, mechanic: sound, targeter: self_location, params: { sound: "entity.warden.sonic_boom", volume: 2.0, pitch: 0.8 } }
  - { trigger: onHealthBelow, value: 30, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 10, damage: 15, knockback: 1.5, particle: SPLASH } }
drops:
  items:
    # Common
    - { item: PRISMARINE_CRYSTALS, amount: "8-16", chance: 1.0, rarity: COMMON }
    - { item: PRISMARINE_SHARD, amount: "8-16", chance: 1.0, rarity: COMMON }
    - { item: COD, amount: "4-9", chance: 0.85, rarity: COMMON }
    - { item: KELP, amount: "6-12", chance: 0.75, rarity: COMMON }
    - { item: SEA_PICKLE, amount: "2-5", chance: 0.6, rarity: COMMON }
    - { item: DIAMOND, amount: "5-9", chance: 1.0, rarity: COMMON }
    # Uncommon
    - { item: WET_SPONGE, amount: "1-3", chance: 0.5, rarity: UNCOMMON }
    # Rare
    - { item: HEART_OF_THE_SEA, amount: 1, chance: 0.45, rarity: RARE, name: "<gradient:#38bdf8:#0c4a6e>Leviathan's Core</gradient>" }
    # Legendary
    - { item: TRIDENT, amount: 1, chance: 0.22, rarity: LEGENDARY,
        name: "<gradient:#38bdf8:#0c4a6e>Tide-Render</gradient>",
        lore: ["<dark_gray>Pulled from the abyss.", "<aqua>The sea obeys it."],
        enchants: ["IMPALING:6", "RIPTIDE:4", "UNBREAKING:5", "MENDING:1"] }
    # Mythical
    - { item: NAUTILUS_SHELL, amount: "1-2", chance: 0.05, rarity: MYTHICAL,
        name: "<gradient:#ff6bd6:#c86bff>Abyssal Pearl</gradient>", lore: ["<dark_gray>The heartbeat of the deep."] }
  command-rewards:
    # Mythical
    - { command: "pets give axolotl 1 %player%", chance: 0.06, announce: "<gradient:#ff6bd6:#c86bff>✦ Mythical</gradient> <gray>-</gray> <gradient:#38bdf8:#0c4a6e>an Axolotl pet from the Leviathan!</gradient>" }
  xp: 1150
