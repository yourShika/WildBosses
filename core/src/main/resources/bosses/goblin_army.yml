# The Goblin Warband - EASY army led by Grizznak the Plunderer.
# Five escalating waves; each wave you must slay more. After the 5th wave, Grizznak the Goblin King
# emerges (this def's own statline).
id: goblin_army
name: "<gradient:#84cc16:#3f6212>Grizznak the Plunderer</gradient>"
title: "<gray>Warlord of the Goblin Warband"
difficulty: EASY
base-entity: VINDICATOR
stats: { health: 300, armor: 10, knockback-resistance: 0.4, damage: 9, speed: 0.33, follow-range: 44, scale: 1.3 }
equipment: { hand: IRON_AXE, head: LEATHER_HELMET }
bossbar: { color: GREEN, style: NOTCHED_10 }
spawn:
  worlds: [OVERWORLD]
  weight: 30
  min-players-distance: 40
  y: { min: 45, max: 110 }
  cooldown-seconds: 1200
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<green>Grizznak the Goblin King enters the fray!" }
  - { at-health-percent: 40, enrage: true, message: "<dark_green>Grizznak flies into a plundering rage!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 45, lines: ["The King has arrived, worms!", "You beat my warband? Now beat ME!", "Shinies! Give me your shinies!"] } }
  - { trigger: onTimer, interval: 100, interval-max: 160, mechanic: leap, targeter: nearest_player, params: { power: 1.2, vertical: 0.5 } }
  - { trigger: onTimer, interval: 150, interval-max: 240, mechanic: summon, targeter: self_location, params: { type: VINDICATOR, amount: 3, radius: 5 } }
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: knockback, targeter: players_in_radius, params: { radius: 4, strength: 1.0, vertical: 0.35 } }
army:
  # Kill counts per wave (increasing). After the last wave, the outcome resolves.
  stages: [8, 12, 16, 20, 24]
  wave-size: 6
  max-alive: 20
  reinforce-interval-ticks: 100
  radius: 12
  outcome: SPAWN_BOSS
  end-boss: goblin_army
  minions:
    - { type: VINDICATOR, weight: 3, health: 24, name: "<green>Goblin Raider" }
    - { type: ZOMBIE, weight: 2, health: 20, name: "<green>Goblin Grunt" }
    - { type: PILLAGER, weight: 1, health: 22, name: "<green>Goblin Slinger" }
drops:
  items:
    # Common
    - { item: EMERALD, amount: "6-12", chance: 1.0, rarity: COMMON }
    - { item: IRON_INGOT, amount: "4-8", chance: 0.9, rarity: COMMON }
    # Uncommon
    - { item: GOLDEN_APPLE, amount: "1-2", chance: 0.55, rarity: UNCOMMON, name: "<gradient:#84cc16:#3f6212>Plunderer's Prize</gradient>" }
    # Rare
    - { item: LEATHER_CHESTPLATE, amount: 1, chance: 0.35, rarity: RARE,
        name: "<gradient:#84cc16:#3f6212>Warlord's Hide</gradient>", enchants: ["PROTECTION:3", "THORNS:2"] }
    # Legendary
    - { item: DIAMOND_AXE, amount: 1, chance: 0.2, rarity: LEGENDARY,
        name: "<gradient:#84cc16:#3f6212>Grizznak's Plunder-Axe</gradient>",
        lore: ["<dark_gray>Notched from a hundred raids.", "<green>Loves shiny things."],
        enchants: ["SHARPNESS:5", "LOOTING:3", "UNBREAKING:3"] }
  xp: 450
