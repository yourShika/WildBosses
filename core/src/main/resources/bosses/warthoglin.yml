# Warthoglin, the Goldtusk King - ULTRA_HARD Nether boss. Fights entirely alone (no summoned brutes),
# but hits like a freight train. Signature move: a radial storm of axes.
# Note: the pet command-reward uses BetterModel/BetterPets ids - adjust "phoenix" to match your setup.
id: warthoglin
name: "<gradient:#f59e0b:#7c2d12>Warthoglin, the Goldtusk King</gradient>"
title: "<gray>King of the Piglins"
difficulty: ULTRA_HARD
base-entity: PIGLIN_BRUTE
stats: { health: 760, armor: 18, armor-toughness: 8, knockback-resistance: 0.9, damage: 18, speed: 0.31, follow-range: 48, scale: 1.0 }
equipment: { hand: GOLDEN_AXE, head: GOLDEN_HELMET }
bossbar: { color: RED, style: NOTCHED_10 }
immunities: [FIRE, KNOCKBACK]
enrage-timer: { enabled: true, after-seconds: 300, interval-seconds: 45, damage-mult: 1.15, speed-mult: 1.06 }
spawn:
  worlds: [NETHER]
  weight: 12
  min-players-distance: 44
  y: { min: 20, max: 110 }
  cooldown-seconds: 3000
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<gold>Warthoglin, the Goldtusk King, charges onto the field!" }
  - { at-health-percent: 60, message: "<#ff8c00>Warthoglin roars - the tusk-king's fury builds!" }
  - { at-health-percent: 30, enrage: true, message: "<red>Warthoglin enters a golden fury!" }
skills:
  - { trigger: onSpawn, mechanic: sound, targeter: self_location, params: { sound: "entity.piglin_brute.angry", volume: 1.6, pitch: 0.6 } }
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 45, lines: ["Bow to the Goldtusk King!", "Gold... and your bones... are MINE!", "You dare enter my realm?"] } }
  - { trigger: onTimer, interval: 16, mechanic: particle, targeter: self_location, params: { particle: FLAME, count: 5, spread: 0.6, offset-y: 1.2 } }
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: leap, targeter: nearest_player, params: { power: 1.6, vertical: 0.6 } }
  # Axe storm: Warthoglin plants his feet and hurls a wide fan of axes.
  - { trigger: onTimer, interval: 110, interval-max: 150, mechanic: say, targeter: players_in_radius, params: { radius: 30, lines: ["AXE STORM!", "Chop, chop, chop!"] } }
  - { trigger: onTimer, interval: 110, interval-max: 150, mechanic: sound, targeter: self_location, params: { sound: "item.trident.throw", volume: 1.4, pitch: 0.7 } }
  - { trigger: onTimer, interval: 110, interval-max: 150, mechanic: axe_throw, targeter: self, params: { count: 16, velocity: 1.7, type: ARROW, particle: LAVA } }
  # Meteor bombardment - a rain of molten gold.
  - { trigger: onTimer, interval: 150, interval-max: 210, mechanic: meteor, targeter: players_in_radius, params: { count: 6, radius: 8, height: 22, damage: 13, delay: 25, fire: true } }
  - { trigger: onHealthBelow, value: 60, mechanic: shockwave, targeter: self, params: { radius: 9, damage: 15, knockup: 1.0, particle: LAVA } }
  - { trigger: onHealthBelow, value: 30, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 7, damage: 16, knockback: 1.6, particle: FLAME } }
  - { trigger: onHealthBelow, value: 30, mechanic: buff, targeter: self, params: { type: STRENGTH, duration: 300, amplifier: 1 } }
drops:
  items:
    # Common
    - { item: GOLD_NUGGET, amount: "12-24", chance: 1.0, rarity: COMMON }
    - { item: GOLD_INGOT, amount: "4-9", chance: 0.9, rarity: COMMON }
    - { item: GLOWSTONE_DUST, amount: "4-9", chance: 0.75, rarity: COMMON }
    - { item: QUARTZ, amount: "6-12", chance: 0.75, rarity: COMMON }
    - { item: GILDED_BLACKSTONE, amount: "4-8", chance: 0.8, rarity: COMMON }
    # Uncommon
    - { item: GOLD_BLOCK, amount: "4-8", chance: 0.6, rarity: UNCOMMON }
    - { item: MAGMA_CREAM, amount: "2-5", chance: 0.5, rarity: UNCOMMON }
    # Rare
    - { item: NETHERITE_INGOT, amount: "1-3", chance: 0.45, rarity: RARE, name: "<gradient:#f59e0b:#7c2d12>Goldtusk Ingot</gradient>" }
    - { item: GOLDEN_HELMET, amount: 1, chance: 0.35, rarity: RARE,
        name: "<gradient:#fbbf24:#b45309>Crown of the Goldtusk</gradient>",
        enchants: ["PROTECTION:4", "FIRE_PROTECTION:4"] }
    # Legendary
    - { item: GOLDEN_AXE, amount: 1, chance: 0.2, rarity: LEGENDARY,
        name: "<gradient:#fbbf24:#b45309>Warthoglin's Cleaver</gradient>",
        lore: ["<dark_gray>The tusk-king's own axe.", "<gold>Still smoking."],
        enchants: ["SHARPNESS:7", "FIRE_ASPECT:2", "UNBREAKING:3"] }
    # Mythical
    - { item: NETHERITE_BLOCK, amount: 1, chance: 0.04, rarity: MYTHICAL,
        name: "<gradient:#ff6bd6:#c86bff>Bullion of the Goldtusk Throne</gradient>", lore: ["<dark_gray>A king's ransom in one block."] }
  command-rewards:
    # Mythical
    - { command: "pets give phoenix 1 %player%", chance: 0.05, announce: "<gradient:#ff6bd6:#c86bff>✦ Mythical</gradient> <gray>-</gray> <gradient:#f59e0b:#7c2d12>a Phoenix pet from the Goldtusk King!</gradient>" }
  xp: 1300
