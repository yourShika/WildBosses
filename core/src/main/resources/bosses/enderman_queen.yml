# Nyxara, Queen of the Void - ULTRA_HARD End boss. Relentlessly hostile (no need to stare at her),
# and her teleports now only ever land on safe ground - never inside blocks.
# Pet reward uses a BetterPets id - adjust "shadow_dragon" to match your setup.
id: enderman_queen
name: "<gradient:#a855f7:#312e81>Nyxara, Queen of the Void</gradient>"
title: "<gray>Empress of the Endless Dark"
difficulty: ULTRA_HARD
base-entity: ENDERMAN
stats: { health: 660, armor: 10, knockback-resistance: 0.8, damage: 13, speed: 0.32, follow-range: 64, scale: 1.4 }
bossbar: { color: PURPLE, style: NOTCHED_10 }
enrage-timer: { enabled: true, after-seconds: 300, interval-seconds: 45, damage-mult: 1.1, speed-mult: 1.05 }
spawn:
  worlds: [THE_END]
  weight: 18
  min-players-distance: 48
  y: { min: 45, max: 90 }
  cooldown-seconds: 2400
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<light_purple>Nyxara, Queen of the Void, materialises!" }
  - { at-health-percent: 60, message: "<dark_purple>Nyxara flickers between spaces!" }
  - { at-health-percent: 30, enrage: true, message: "<dark_purple>Nyxara tears reality asunder!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 50, lines: ["You should not have come here.", "The void hungers.", "I am everywhere and nowhere."] } }
  - { trigger: onTimer, interval: 10, mechanic: particle, targeter: self_location, params: { particle: PORTAL, count: 12, spread: 0.8, offset-y: 1.2 } }
  - { trigger: onTimer, interval: 60, interval-max: 100, mechanic: sound, targeter: self_location, params: { sound: "entity.enderman.teleport", volume: 1.4, pitch: 0.8 } }
  - { trigger: onTimer, interval: 60, interval-max: 100, mechanic: teleport, targeter: nearest_player, params: { radius: 3 } }
  - { trigger: onTimer, interval: 100, interval-max: 160, mechanic: teleport_target, targeter: random_nearby, params: { radius: 6 } }
  - { trigger: onTimer, interval: 80, interval-max: 130, mechanic: pull, targeter: players_in_radius, params: { radius: 10, strength: 1.2 } }
  - { trigger: onTimer, interval: 110, interval-max: 170, mechanic: danger_zone, targeter: players_in_radius, params: { radius: 4, damage: 11, delay: 28, warn-particle: PORTAL, particle: DRAGON_BREATH } }
  - { trigger: onTimer, interval: 140, interval-max: 210, mechanic: summon, targeter: self_location, params: { type: ENDERMITE, amount: 4, radius: 4 } }
  - { trigger: onTimer, interval: 190, interval-max: 260, mechanic: say, targeter: nearest_player, params: { radius: 50, lines: ["Come closer, little star.", "There is no escape from the dark.", "Blink. I dare you."] } }
  - { trigger: onHealthBelow, value: 60, mechanic: buff, targeter: self, params: { type: SPEED, duration: 300, amplifier: 1 } }
  - { trigger: onHealthBelow, value: 30, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 8, damage: 12, knockback: 1.0, particle: DRAGON_BREATH } }
drops:
  items:
    # Common
    - { item: ENDER_PEARL, amount: "6-12", chance: 1.0, rarity: COMMON }
    - { item: DIAMOND, amount: "5-9", chance: 1.0, rarity: COMMON }
    # Rare
    - { item: NETHER_STAR, amount: 1, chance: 0.3, rarity: RARE, name: "<gradient:#a855f7:#312e81>Heart of the Void</gradient>" }
    # Legendary
    - { item: NETHERITE_SWORD, amount: 1, chance: 0.2, rarity: LEGENDARY,
        name: "<gradient:#a855f7:#312e81>Edge of the Endless Dark</gradient>",
        lore: ["<dark_gray>Cut from the space between stars.", "<dark_purple>It phases through armour."],
        enchants: ["SHARPNESS:6", "UNBREAKING:3", "MENDING:1"] }
    # Mythical
    - { item: ELYTRA, amount: 1, chance: 0.06, rarity: MYTHICAL, name: "<gradient:#ff6bd6:#c86bff>Voidwing of Nyxara</gradient>",
        lore: ["<dark_gray>Torn from the fabric of the End."] }
  command-rewards:
    # Mythical
    - { command: "pets give shadow_dragon 1 %player%", chance: 0.05, announce: "<gradient:#ff6bd6:#c86bff>✦ Mythical</gradient> <gray>-</gray> <gradient:#a855f7:#312e81>a Shadow Dragon pet from the Void Queen!</gradient>" }
  xp: 1050
