# Kaboomicus, the Sundering King - HARD overworld boss.
# Explosions never break blocks. At low health he detonates - and dies from his own blast.
id: creeper_king
name: "<gradient:#22c55e:#064e3b>Kaboomicus, the Sundering King</gradient>"
title: "<gray>He Who Ends With a Bang"
difficulty: HARD
base-entity: CREEPER
stats: { health: 480, armor: 8, knockback-resistance: 0.4, damage: 7, speed: 0.28, follow-range: 40, scale: 1.7 }
bossbar: { color: GREEN, style: NOTCHED_10 }
immunities: [EXPLOSION]     # his own blasts don't chip him; only the final self-detonation kills him
spawn:
  worlds: [OVERWORLD]
  weight: 14
  min-players-distance: 40
  y: { min: 40, max: 110 }
  cooldown-seconds: 2400
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<green>Kaboomicus fizzes ominously into view..." }
  - { at-health-percent: 50, enrage: true, message: "<dark_green>Kaboomicus begins to overcharge!" }
  - { at-health-percent: 15, message: "<red>Kaboomicus swells to bursting - RUN!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 40, lines: ["Sssssay goodbye.", "Tick... tick... tick...", "Let's make a big bang."] } }
  - { trigger: onTimer, interval: 12, mechanic: particle, targeter: self_location, params: { particle: FLAME, count: 6, spread: 0.7, offset-y: 0.8 } }
  - { trigger: onTargetInRange, radius: 5, cooldown: 100, mechanic: explode, targeter: self_location, params: { power: 3.0, fire: false } }
  - { trigger: onTimer, interval: 150, interval-max: 240, mechanic: summon, targeter: self_location, params: { type: CREEPER, amount: 3, radius: 6 } }
  - { trigger: onTimer, interval: 60, interval-max: 100, mechanic: knockback, targeter: players_in_radius, params: { radius: 5, strength: 1.4, vertical: 0.5 } }
  - { trigger: onTimer, interval: 190, mechanic: say, targeter: nearest_player, params: { radius: 40, lines: ["Ka... BOOM!", "Feel the pressure?", "Hold still, this won't hurt... me."] } }
  - { trigger: onHealthBelow, value: 50, mechanic: explode, targeter: self_location, params: { power: 5.0, fire: false } }
  # Final detonation: a huge blast that also kills Kaboomicus (kill-caster). Still no block damage.
  - { trigger: onHealthBelow, value: 15, mechanic: say, targeter: players_in_radius, params: { radius: 40, lines: ["IF I FALL... YOU FALL WITH ME!"] } }
  - { trigger: onHealthBelow, value: 15, mechanic: explode, targeter: self_location, params: { power: 8.0, fire: false, kill-caster: true } }
  # Sprengsaat (Signature): once overcharged he sows slow, telegraphed proximity mines (no block damage).
  - { trigger: onTimer, interval: 120, interval-max: 180, mechanic: say, targeter: players_in_radius, conditions: [{ type: phase_at_least, phase: 1 }], params: { radius: 40, lines: ["Mind the eggs.", "Sssurprise underfoot."] } }
  - { trigger: onTimer, interval: 120, interval-max: 180, mechanic: danger_zone, targeter: players_in_radius, conditions: [{ type: phase_at_least, phase: 1 }], params: { radius: 3, damage: 9, knockback: 1.2, delay: 60, warn-particle: FLAME, particle: EXPLOSION_EMITTER } }
drops:
  items:
    # Common
    - { item: GUNPOWDER, amount: "8-16", chance: 1.0, rarity: COMMON }
    - { item: COAL, amount: "6-12", chance: 0.85, rarity: COMMON }
    - { item: REDSTONE, amount: "4-10", chance: 0.8, rarity: COMMON }
    - { item: SAND, amount: "8-16", chance: 0.7, rarity: COMMON }
    - { item: DIAMOND, amount: "3-6", chance: 1.0, rarity: COMMON }
    # Uncommon
    - { item: TNT, amount: "8-16", chance: 0.8, rarity: UNCOMMON }
    - { item: FIREWORK_ROCKET, amount: "8-16", chance: 0.6, rarity: UNCOMMON, name: "<gradient:#22c55e:#065f46>Sundering Charge</gradient>" }
    # Rare
    - { item: CREEPER_HEAD, amount: 1, chance: 0.4, rarity: RARE, name: "<gradient:#22c55e:#065f46>Crown of Kaboomicus</gradient>" }
    # Legendary
    - { item: DIAMOND_CHESTPLATE, amount: 1, chance: 0.2, rarity: LEGENDARY,
        name: "<gradient:#22c55e:#064e3b>Blastplate of Kaboomicus</gradient>",
        lore: ["<dark_gray>Scorched but unbroken.", "<green>Laughs at explosions."],
        enchants: ["BLAST_PROTECTION:5", "PROTECTION:5", "THORNS:4", "UNBREAKING:5"] }
    # Mythical
    - { item: TNT_MINECART, amount: 1, chance: 0.05, rarity: MYTHICAL,
        name: "<gradient:#ff6bd6:#c86bff>The Big One</gradient>", lore: ["<dark_gray>Kaboomicus' final, favourite word."] }
  xp: 650
