# Kaboomicus, the Sundering King - HARD overworld boss. Explosions never break blocks.
id: creeper_king
name: "<gradient:#22c55e:#064e3b>Kaboomicus, the Sundering King</gradient>"
title: "<gray>He Who Ends With a Bang"
difficulty: HARD
base-entity: CREEPER
model: ""
stats: { health: 480, armor: 8, knockback-resistance: 0.4, damage: 7, speed: 0.28, follow-range: 40, scale: 1.7 }
bossbar: { color: GREEN, style: NOTCHED_10 }
spawn:
  worlds: [OVERWORLD]
  weight: 14
  min-players-distance: 40
  y: { min: 40, max: 110 }
  cooldown-seconds: 2400
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<green>Kaboomicus fizzes ominously into view..." }
  - { at-health-percent: 50, enrage: true, message: "<dark_green>Kaboomicus begins to overcharge!" }
skills:
  - { trigger: onTargetInRange, radius: 5, cooldown: 100, mechanic: explode, targeter: self_location, params: { power: 3.0, fire: false } }
  - { trigger: onTimer, interval: 140, mechanic: summon, targeter: self_location, params: { type: CREEPER, amount: 4, radius: 6 } }
  - { trigger: onTimer, interval: 60, mechanic: knockback, targeter: players_in_radius, params: { radius: 5, strength: 1.4, vertical: 0.5 } }
  - { trigger: onHealthBelow, value: 50, mechanic: explode, targeter: self_location, params: { power: 5.0, fire: false } }
  - { trigger: onDeath, mechanic: explode, targeter: self_location, params: { power: 4.0, fire: false } }
drops:
  items:
    - { item: DIAMOND, amount: "3-6", chance: 1.0 }
    - { item: TNT, amount: "8-16", chance: 0.8 }
    - { item: CREEPER_HEAD, amount: 1, chance: 0.4, glow: true, name: "<gradient:#22c55e:#065f46>Crown of Kaboomicus</gradient>" }
  xp: 650
