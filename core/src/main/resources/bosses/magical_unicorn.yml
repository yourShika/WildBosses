# Aurelith, the Prism Mare - MAGICAL overworld boss. Always a pure-white steed. Flies, deals real
# damage and summons prism-wisps. Pet reward uses a BetterPets id - adjust "pixie" to match your setup.
id: magical_unicorn
name: "<gradient:#f9a8d4:#a78bfa:#93c5fd>Aurelith, the Prism Mare</gradient>"
title: "<gray>Keeper of Impossible Colours"
difficulty: MAGICAL
base-entity: HORSE
stats: { health: 580, armor: 8, knockback-resistance: 0.5, damage: 12, speed: 0.4, follow-range: 48, scale: 1.3 }
bossbar: { color: PINK, style: NOTCHED_10 }
spawn:
  worlds: [OVERWORLD]
  weight: 8
  min-players-distance: 40
  y: { min: 60, max: 120 }
  cooldown-seconds: 3600
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<gradient:#f9a8d4:#93c5fd>Aurelith, the Prism Mare, shimmers into the world!</gradient>" }
  - { at-health-percent: 66, message: "<light_purple>Aurelith's mane blazes with prism-light!" }
  - { at-health-percent: 33, enrage: true, animation: rage, message: "<light_purple>Aurelith ascends in a storm of colour!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 40, lines: ["Behold true beauty.", "Colour is a weapon, darling.", "You cannot outrun a rainbow."] } }
  - { trigger: onSpawn, mechanic: particle, targeter: self_location, params: { particle: HEART, count: 40, spread: 1.5 } }
  - { trigger: onTimer, interval: 8, mechanic: particle, targeter: self_location, params: { particle: DUST_COLOR_TRANSITION, count: 10, spread: 0.9, offset-y: 1.2 } }
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: sound, targeter: self_location, params: { sound: "entity.illusioner.cast_spell", volume: 1.2, pitch: 1.4 } }
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: beam, targeter: nearest_player, params: { radius: 30, damage: 13, particle: DRAGON_BREATH } }
  - { trigger: onTimer, interval: 100, interval-max: 150, mechanic: charm, targeter: players_in_radius, params: { radius: 8, duration: 120 } }
  - { trigger: onTimer, interval: 150, interval-max: 230, mechanic: summon, targeter: self_location, params: { type: VEX, amount: 3, radius: 4, name: "<light_purple>Prism Wisp" } }
  - { trigger: onTimer, interval: 90, interval-max: 140, mechanic: leap, targeter: nearest_player, params: { power: 1.4, vertical: 0.55 } }
  - { trigger: onHealthBelow, value: 66, mechanic: heal, targeter: self, params: { amount: 90 } }
  - { trigger: onHealthBelow, value: 33, mechanic: fly, targeter: nearest_player, params: { duration: 140, lift: 0.6 } }
  - { trigger: onHealthBelow, value: 33, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 7, damage: 12, knockback: 1.0, particle: TOTEM_OF_UNDYING } }
  - { trigger: onPhaseChange, phase: 2, mechanic: buff, targeter: self, params: { type: SPEED, duration: 400, amplifier: 1 } }
drops:
  items:
    - { item: NETHER_STAR, amount: 1, chance: 0.6, glow: true, announce: true, name: "<gradient:#f9a8d4:#93c5fd>Heart of Aurelith</gradient>" }
    - { item: GOLDEN_APPLE, amount: "3-6", chance: 1.0 }
    - { item: DIAMOND, amount: "4-8", chance: 1.0 }
    - { item: DIAMOND_HORSE_ARMOR, amount: 1, chance: 0.3, glow: true, announce: true,
        name: "<gradient:#f9a8d4:#93c5fd>Prism Barding</gradient>", lore: ["<gray>Woven from impossible colours."] }
    - { item: ENCHANTED_GOLDEN_APPLE, amount: 1, chance: 0.2, announce: true, name: "<gradient:#f9a8d4:#93c5fd>Aurelith's Blessing</gradient>" }
  command-rewards:
    - { command: "pets give pixie 1 %player%", chance: 0.08, announce: "<gradient:#f9a8d4:#93c5fd>was blessed with a Pixie pet by Aurelith!</gradient>" }
  xp: 950
