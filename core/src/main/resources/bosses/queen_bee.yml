# Vespula, the Hive Queen - HARD overworld boss. Immediately hostile, flies, summons bees, stings.
# (She stays angry for the whole fight and can't die to her own sting.)
# Pet reward uses a BetterPets id - adjust "bee" to match your setup.
id: queen_bee
name: "<gradient:#fde047:#a16207>Vespula, the Hive Queen</gradient>"
title: "<gray>Queen Bee"
difficulty: HARD
base-entity: BEE
stats: { health: 480, armor: 6, knockback-resistance: 0.4, damage: 9, speed: 0.36, follow-range: 48, scale: 2.3 }
bossbar: { color: YELLOW, style: NOTCHED_10 }
spawn:
  worlds: [OVERWORLD]
  weight: 14
  min-players-distance: 40
  y: { min: 60, max: 130 }
  cooldown-seconds: 2400
  max-concurrent: 1
phases:
  - { at-health-percent: 100, message: "<yellow>Vespula, the Hive Queen, descends with an angry drone!" }
  - { at-health-percent: 50, enrage: true, message: "<gold>Vespula summons the swarm!" }
skills:
  - { trigger: onSpawn, mechanic: say, targeter: nearest_player, params: { radius: 40, lines: ["You disturbed the hive.", "My children are always hungry.", "Bzzz... you smell like a thief."] } }
  - { trigger: onSpawn, mechanic: sound, targeter: self_location, params: { sound: "entity.bee.loop_aggressive", volume: 1.6, pitch: 0.7 } }
  - { trigger: onTimer, interval: 14, mechanic: particle, targeter: self_location, params: { particle: FALLING_DUST, count: 6, spread: 0.7, offset-y: 1.0 } }
  - { trigger: onTimer, interval: 120, interval-max: 180, mechanic: summon, targeter: self_location, params: { type: BEE, amount: 4, radius: 5, health: 12 } }
  - { trigger: onTimer, interval: 70, interval-max: 110, mechanic: poison, targeter: players_in_radius, params: { radius: 4, duration: 140, amplifier: 1 } }
  - { trigger: onTimer, interval: 80, interval-max: 130, mechanic: projectile, targeter: nearest_player, params: { type: SMALL_FIREBALL, velocity: 1.2 } }
  - { trigger: onTimer, interval: 120, interval-max: 190, mechanic: fly, targeter: nearest_player, params: { duration: 120, lift: 0.5 } }
  # Stinging dive: a telegraphed plunge onto the target.
  - { trigger: onTimer, interval: 150, interval-max: 220, mechanic: danger_zone, targeter: players_in_radius, params: { radius: 3, damage: 9, delay: 25, warn-particle: WAX_ON, particle: CRIT } }
  - { trigger: onHealthBelow, value: 50, mechanic: summon, targeter: self_location, params: { type: BEE, amount: 6, radius: 6, health: 12 } }
  - { trigger: onHealthBelow, value: 50, mechanic: aoe_damage, targeter: players_in_radius, params: { radius: 6, damage: 10, knockback: 0.8, particle: HEART } }
  # Swarm-Wrath (Signature): once the hive is enraged her fury builds - faster, angrier, more bees.
  - { trigger: onTimer, interval: 70, mechanic: buff, targeter: self, conditions: [{ type: phase_at_least, phase: 1 }], params: { type: SPEED, duration: 90, amplifier: 1 } }
  - { trigger: onTimer, interval: 72, mechanic: buff, targeter: self, conditions: [{ type: phase_at_least, phase: 1 }], params: { type: STRENGTH, duration: 90, amplifier: 0 } }
  - { trigger: onTimer, interval: 130, interval-max: 180, mechanic: summon, targeter: self_location, conditions: [{ type: phase_at_least, phase: 1 }], params: { type: BEE, amount: 3, radius: 5, health: 12 } }
# She turns the ground into a honeycomb glade with little bee-trees - and it STAYS (restore-on-end: false).
# Spawns near players (only-ungenerated-chunks: false); player builds are still never overwritten
# (allowlist + block-entity guard + CoreProtect/region checks).
terrain:
  enabled: true
  radius: 8
  max-blocks: 2600
  restore-on-end: false
  only-ungenerated-chunks: false
  mappings:
    GRASS_BLOCK: HONEYCOMB_BLOCK
    DIRT: HONEYCOMB_BLOCK
    COARSE_DIRT: HONEYCOMB_BLOCK
    PODZOL: HONEYCOMB_BLOCK
    ROOTED_DIRT: HONEYCOMB_BLOCK
    MOSS_BLOCK: HONEYCOMB_BLOCK
    SAND: HONEY_BLOCK
    RED_SAND: HONEY_BLOCK
  features:
    - { type: bee_tree, count: 5 }
    - { type: honey_patch, count: 8 }
drops:
  items:
    # Common
    - { item: HONEYCOMB, amount: "8-16", chance: 1.0, rarity: COMMON }
    - { item: HONEY_BOTTLE, amount: "4-8", chance: 0.9, rarity: COMMON }
    - { item: HONEYCOMB_BLOCK, amount: "1-3", chance: 0.7, rarity: COMMON }
    - { item: DANDELION, amount: "3-7", chance: 0.75, rarity: COMMON }
    - { item: CHERRY_LEAVES, amount: "4-9", chance: 0.6, rarity: COMMON }
    # Uncommon
    - { item: HONEY_BLOCK, amount: "1-2", chance: 0.5, rarity: UNCOMMON }
    - { item: DIAMOND, amount: "2-5", chance: 0.7, rarity: UNCOMMON }
    - { item: GOLDEN_APPLE, amount: "1-2", chance: 0.55, rarity: UNCOMMON, name: "<gradient:#fde047:#a16207>Royal Jelly</gradient>" }
    # Rare
    - { item: SHIELD, amount: 1, chance: 0.3, rarity: RARE,
        name: "<gradient:#fde047:#a16207>Aegis of the Hive</gradient>",
        lore: ["<dark_gray>Woven from royal wax."], enchants: ["UNBREAKING:5", "MENDING:1"] }
    # Legendary
    - { item: NETHERITE_SWORD, amount: 1, chance: 0.16, rarity: LEGENDARY,
        name: "<gradient:#fde047:#a16207>Queen's Stinger</gradient>",
        lore: ["<yellow>Drips with venom."], enchants: ["SHARPNESS:7", "BANE_OF_ARTHROPODS:6", "UNBREAKING:5", "MENDING:1"] }
  command-rewards:
    # Mythical
    - { command: "pets give bee 1 %player%", chance: 0.06, announce: "<gradient:#ff6bd6:#c86bff>✦ Mythical</gradient> <gray>-</gray> <gradient:#fde047:#a16207>a Bee pet from the Hive Queen!</gradient>" }
  xp: 680
