# =====================================================================================
#  WildBosses - main configuration
#  All message strings use MiniMessage (https://docs.advntr.dev/minimessage/) and support
#  <gradient:#aaa:#bbb>, <color>, <bold>, hover/click tags, etc.
# =====================================================================================

settings:
  # Language for all plugin text (messages, broadcasts, boss/item names): en, de or pl.
  # Missing keys fall back to English. Add your own lang/<code>.yml for more languages.
  language: en
  # Master switch for automatic random boss spawning.
  random-spawns: true
  # Time between spawn cycles. Each cycle waits a RANDOM duration between min and max minutes
  # (set them equal for a fixed interval). Supports anything from 1 minute to 60+.
  spawn-interval:
    min-minutes: 10
    max-minutes: 30
  # Legacy fixed interval (seconds) - only used if spawn-interval above is removed.
  spawn-interval-seconds: 600
  # How many spawn attempts to make each cycle (each still has to satisfy a boss' spawn rules).
  spawn-attempts-per-cycle: 1
  # Hard cap on how many bosses may be active at once (armies count as one).
  max-active-bosses: 5
  # Minimum distance (blocks) enforced between two active bosses.
  min-distance-between-bosses: 200
  # Normal bosses spawn at least this many blocks from EVERY online player (the spot is re-rolled
  # until it is far enough from everyone). Players travel to the broadcast coordinates.
  # (Terrain/army encounters additionally only spawn on never-generated "frontier" chunks.)
  min-player-distance: 500
  # An un-engaged boss (nobody has fought it) despawns after this many minutes, freeing its
  # force-loaded chunk. The full flee lifetime below only starts once a player makes contact.
  unclaimed-despawn-minutes: 8
  # A single hit can never take more than this fraction of a boss' max health (prevents one-shots).
  # 0.5 = at most 50% per hit (>= 2 hits to kill). Set to 1.0 to allow one-shots.
  max-hit-damage-percent: 0.5
  # Bosses listed here are switched OFF: never loaded, never auto-restored (survives /wb reload
  # and /wb restore default). Use lowercase ids, e.g. [zombie_king, medusa].
  disabled-bosses: []
  # Bosses/armies that are never defeated eventually flee (with a broadcast). A random lifetime
  # between min and max minutes is chosen per encounter.
  boss-lifetime:
    enabled: true
    min-minutes: 30
    max-minutes: 60
  # Scale a boss up when more players are nearby. Measured once at spawn and kept for the whole
  # fight (it does NOT drop if players later die or run away). Scales health, damage and armor.
  scaling:
    enabled: true
    radius: 48
    per-player-multiplier: 1.5   # each attacking player beyond the first multiplies stats by this (x1.5)
    max-multiplier: 5.0          # hard cap on the total multiplier (measured on first player contact)
    engage-window-seconds: 10    # after first contact, keep matching the growing crowd for this long

rewards:
  # If true, every player who damaged the boss gets their own loot roll (no loot stealing).
  participation-loot: true
  # How many items actually drop per kill. Each item still rolls its own chance, but the result is
  # capped to a random count in [min, max] (the rarest winners are kept), and topped up to min.
  # Every dropped item is announced in chat (with its amount). Pets are separate bonus rewards.
  drop-count:
    min: 1
    max: 3

# Terrain theming failsafe: the ONLY block types a boss' terrain/features may ever replace. Anything
# not listed (ores, logs, chests, player blocks, ...) is always left untouched. Trim this to be stricter
# (e.g. just [AIR, DIRT, GRASS_BLOCK, GRAVEL, STONE]) - note the built-in bosses also theme SAND and
# END_STONE, so removing those disables their glade/dais. AIR is always allowed regardless.
terrain:
  replaceable-blocks: [AIR, DIRT, GRASS_BLOCK, COARSE_DIRT, PODZOL, ROOTED_DIRT, MOSS_BLOCK, MYCELIUM,
    MUD, GRAVEL, SAND, RED_SAND, STONE, SANDSTONE, SNOW, SNOW_BLOCK, NETHERRACK, END_STONE,
    END_STONE_BRICKS, TERRACOTTA, SHORT_GRASS, TALL_GRASS, FERN, LARGE_FERN, DEAD_BUSH]

# Lunar events: on some nights a Blood Moon or Crystal Moon rises. Ambient coloured particles drift
# around nearby players, every naturally-spawned hostile mob is buffed, and bosses spawn more often.
# It ends at daybreak (so sleeping through the night also ends it). NOTE: the moon's actual colour
# can't be changed server-side without a resource pack - the mood is shown via particles + a title.
lunar-events:
  enabled: true
  chance: 0.12                 # chance per night for an event to start (0..1)
  types: [bloodmoon, crystalmoon]
  mob-affect-chance: 0.6       # fraction of naturally-spawned hostiles that get empowered (0..1)
  mob-health-multiplier: 1.6   # MAX extra health (each mob rolls a random amount up to this)
  mob-strength: 1              # MAX Strength amplifier (randomised per mob; ~2/3 of them get some)
  mob-speed: 0                 # MAX Speed amplifier (0 = never; randomised, only some mobs)
  boss-extra-attempts: 1       # extra boss-spawn attempts per cycle while an event is active

integrations:
  # Optional Discord webhook URL - posts a message on boss spawn and kill. Leave blank to disable.
  discord-webhook: ""
  # GitHub repo (owner/name) used by "/wb update" to fetch the latest release jar.
  update-repo: "yourShika/WildBosses"
  # When placing a terrain-changing boss, it is only spawned on never-generated ("frontier")
  # chunks. These control how far out from a player the spawner searches for such a spot.
  frontier-search:
    min-distance: 200
    max-distance: 3000
    attempts: 24

# Enable/disable spawning per dimension.
worlds:
  OVERWORLD: true
  NETHER: true
  THE_END: true

broadcast:
  enabled: true
  # Broadcast messages come from the active language file (lang/<language>.yml). Set any of these to
  # a non-empty string here to OVERRIDE the language file for that message. Left blank = use language.
  # Placeholders: <boss> <difficulty> <world> <x> <y> <z> (spawn); <player> <item> <amount> (drop);
  # <slayers> (death - killer names, appended automatically if omitted).
  boss-spawn: ""
  army-spawn: ""
  boss-death: ""
  boss-fled: ""
  boss-drop: ""
  # Announce notable item drops in chat when a boss dies.
  drops:
    enabled: true
    # Auto-announce any drop whose chance is at or below this value (0.0-1.0). Rarer = announced.
    # A drop can also set "announce: true" in its boss YAML to always be broadcast regardless.
    announce-threshold: 0.5
  # Sound played to EVERY online player when a boss is slain (blank = off).
  death-sound: "ui.toast.challenge_complete"

# Override the look of each difficulty tier. Bar colours: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE.
difficulties:
  EASY:       { label: "Easy",       from: "#7CFC00", to: "#2E8B57", bar: GREEN }
  MEDIUM:     { label: "Medium",     from: "#FFD700", to: "#FFB300", bar: YELLOW }
  HARD:       { label: "Hard",       from: "#FF8C00", to: "#FF2D00", bar: RED }
  ULTRA_HARD: { label: "Ultra Hard", from: "#FF1A4B", to: "#7A0000", bar: RED }
  MAGICAL:    { label: "Magical",    from: "#C86BFF", to: "#FF6BD6", bar: PURPLE }
